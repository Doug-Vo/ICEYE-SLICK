<header id="app-header">
  <!-- Logo -->
  <div style="display:flex; flex-direction:column; justify-content:center; gap:2px; flex-shrink:0">
    <div style="display:flex; align-items:center; gap:10px">
      <span style="font-size:22px; font-weight:900; letter-spacing:0.15em; color:#6366f1">SLICK</span>
      <span style="font-size:12px; color:var(--t3); font-family:monospace">on-call handover</span>
    </div>
    <a href="https://github.com/Doug-Vo/ICEYE-SLICK" target="_blank" rel="noopener"
       style="display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600;
              color:#c9d1d9; text-decoration:none; padding:3px 8px; border-radius:20px;
              background:#21262d; border:1px solid #30363d; width:fit-content;
              transition:background 0.15s, border-color 0.15s"
       onmouseover="this.style.background='#30363d'; this.style.borderColor='#8b949e'"
       onmouseout="this.style.background='#21262d'; this.style.borderColor='#30363d'"
       title="View on GitHub">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                 -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
                 .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
                 -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
                 .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
                 .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
                 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      Doug-Vo/ICEYE-SLICK
    </a>
  </div>

  <!-- Timeline (last 6 ended shifts) -->
  <div id="timeline-row"
       style="display:flex; align-items:center; gap:8px; overflow-x:auto; flex:1; padding:0 12px">
  </div>

  <!-- Right controls -->
  <div style="display:flex; align-items:center; gap:10px; flex-shrink:0">
    <!-- Light/dark toggle -->
    <button id="theme-btn" onclick="toggleTheme()"
      title="Toggle theme"
      style="width:38px; height:38px; border-radius:10px; border:1px solid var(--br);
             background:var(--input-bg); cursor:pointer; font-size:18px;
             display:flex; align-items:center; justify-content:center; transition:background 0.2s">
    </button>

    <!-- Shift actions -->
    <div id="shift-actions"></div>
  </div>
</header>
